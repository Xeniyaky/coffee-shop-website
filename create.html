<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Order</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Create a New Order</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="charts.html">Data Visualization</a>
      <a href="about.html">About Us</a>
      <a href="create.html">Create</a>
      <a href="read.html">Read</a>
      <a href="update.html">Update</a>
      <a href="delete.html">Delete</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2>Enter Order Information</h2>
      <form>
        <label for="customer">Customer Name</label>
        <input type="text" id="customer" placeholder="Enter customer name" />

        <label for="drink">Drink Item</label>
        <input type="text" id="drink" placeholder="Enter drink name" />

        <label for="size">Size</label>
        <select id="size">
          <option>Small</option>
          <option>Medium</option>
          <option>Large</option>
        </select>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" placeholder="Enter quantity" />

        <button type="button">Submit Order</button>
      </form>
    </section>
  </main>
</body>
</html>
