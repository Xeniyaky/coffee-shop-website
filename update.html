<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Order</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Update an Order</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="charts.html">Data Visualization</a>
      <a href="about.html">About Us</a>

      <a href="read.html">Read</a>
      <a href="update.html">Update</a>
      <a href="delete.html">Delete</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2>Edit Order Details</h2>
      <form>
        <label for="customer">Customer Name</label>
        <input type="text" id="customer" value="Emma" />

        <label for="drink">Drink Item</label>
        <input type="text" id="drink" value="Latte" />

        <label for="size">Size</label>
        <select id="size">
          <option>Small</option>
          <option selected>Medium</option>
          <option>Large</option>
        </select>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" value="2" />

        <button type="button">Update Order</button>
      </form>
    </section>
  </main>
</body>
